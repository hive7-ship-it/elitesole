<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EliteSole Co.</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body {font-family:'Inter',sans-serif;background:#0a0a0a;color:white;}
.fade-in{animation:fadeIn .5s ease-in;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.product-card:hover{transform:scale(1.02);transition:transform .2s;}
.product-image{transition:opacity .3s;}
.product-card:hover .product-image{opacity:.9;}
.nav-link{position:relative;}
.nav-link::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:white;transition:width .3s;}
.nav-link:hover::after{width:100%;}
.cart-sidebar{transform:translateX(100%);transition:transform .3s;}
.cart-sidebar.open{transform:translateX(0);}
.mobile-menu{max-height:0;overflow:hidden;transition:max-height .3s;}
.mobile-menu.open{max-height:200px;}
</style>
</head>

<body class="min-h-screen flex flex-col">

<header class="fixed top-0 w-full bg-black/95 backdrop-blur-sm z-50 border-b border-gray-800">
<div class="max-w-7xl mx-auto px-4 py-4">
<div class="flex justify-between items-center">

<div class="text-center flex-1 md:flex-none">
<h1 class="text-2xl md:text-3xl font-black tracking-tighter">EliteSole Co.</h1>
<p class="text-[10px] md:text-xs tracking-[0.3em] text-gray-400 uppercase mt-1">
Your Friendly Neighborhood Sneaker Dealer
</p>
</div>

<nav class="hidden md:flex gap-8 text-sm font-semibold">
<a href="#home" class="nav-link">Home</a>
<a href="#shop" class="nav-link">Shop</a>
</nav>

<div class="flex items-center gap-4">
<button onclick="toggleCart()" class="relative p-2">
<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
</svg>
<span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
</button>

<button class="md:hidden p-2" onclick="toggleMobileMenu()">
<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
</svg>
</button>
</div>

</div>

<div id="mobile-menu" class="mobile-menu md:hidden">
<div class="pt-4 pb-2 flex flex-col gap-3 text-sm font-semibold border-t border-gray-800 mt-4">
<a href="#home" class="py-2">Home</a>
<a href="#shop" class="py-2">Shop</a>
</div>
</div>

</div>
</header>

<section id="home" class="pt-32 pb-12 px-4 text-center">
<div class="max-w-4xl mx-auto fade-in">
<p class="text-xs tracking-[0.4em] text-gray-400 mb-4 uppercase">Welcome to</p>
<h2 class="text-4xl md:text-6xl font-black mb-2 tracking-tight">EliteSole Co.</h2>
<p class="text-gray-400 text-sm md:text-base">Premium sneakers. Trusted source. Local service.</p>
</div>
</section>

<section id="shop" class="flex-1 px-4 pb-20">
<div class="max-w-7xl mx-auto">

<div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
<h3 class="text-lg font-bold">All Sneakers</h3>
<span id="product-count" class="text-sm text-gray-500">Loading...</span>
</div>

<div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"></div>

</div>
</section>

<footer class="border-t border-gray-800 py-8 px-4 text-center text-sm text-gray-500">
<div class="max-w-7xl mx-auto">
<p>&copy; 2026 EliteSole Co. All rights reserved.</p>
</div>
</footer>

<div id="toast" class="fixed bottom-4 right-4 bg-white text-black px-4 py-3 rounded shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50 font-semibold text-sm">
Added to cart
</div>

<script>

const products=[
{id:1,name:"Nike Air Force 1 White",price:1899,image:"https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400"},
{id:2,name:"Nike Air Force 1 Black",price:1899,image:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400"},
{id:3,name:"Air Max 90 Infrared",price:2199,image:"https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=400"},
{id:4,name:"Air Max 95 Neon",price:2399,image:"https://images.unsplash.com/photo-1556906781-9a412961c28c?w=400"},
{id:5,name:"Jordan 1 High OG",price:3499,image:"https://images.unsplash.com/photo-1611510338559-2f463335092c?w=400"},
{id:6,name:"Jordan 4 Retro",price:3299,image:"https://images.unsplash.com/photo-1584735175315-9d5df23860e6?w=400"},
{id:7,name:"Adidas Samba OG",price:1499,image:"https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=400"},
{id:8,name:"Adidas Campus 00s",price:1699,image:"https://images.unsplash.com/photo-1587563871167-1ee9c731aefb?w=400"}
];

let cart=[];

document.addEventListener('DOMContentLoaded',()=>{
renderProducts();
document.getElementById('product-count').textContent=`${products.length} products`;
});

function renderProducts(){

const grid=document.getElementById('product-grid');

grid.innerHTML=products.map((product,index)=>`

<div class="product-card group cursor-pointer fade-in" style="animation-delay:${index*0.05}s">

<div class="aspect-square bg-gray-900 rounded-lg overflow-hidden mb-3 relative">

<img src="${product.image}" alt="${product.name}" class="product-image w-full h-full object-cover">

<button onclick="addToCart(${product.id})"
class="absolute bottom-0 left-0 right-0 bg-white text-black py-2 text-sm font-bold opacity-0 group-hover:opacity-100 transition-opacity">
Add to Cart
</button>

</div>

<h4 class="text-sm font-medium text-gray-300 mb-1 truncate">${product.name}</h4>
<p class="font-bold">R${product.price.toLocaleString()}</p>

</div>

`).join('');

}

function addToCart(productId){

const product=products.find(p=>p.id===productId);
const existing=cart.find(i=>i.id===productId);

if(existing){existing.quantity++;}
else{cart.push({...product,quantity:1});}

updateCart();
showToast();

}

function updateCart(){

const cartCount=document.getElementById('cart-count');
const totalItems=cart.reduce((s,i)=>s+i.quantity,0);

cartCount.textContent=totalItems;

}

function toggleCart(){
const sidebar=document.getElementById('cart-sidebar');
if(sidebar){sidebar.classList.toggle('open');}
}

function toggleMobileMenu(){
const menu=document.getElementById('mobile-menu');
menu.classList.toggle('open');
}

function showToast(){

const toast=document.getElementById('toast');

toast.classList.remove('translate-y-20','opacity-0');

setTimeout(()=>{
toast.classList.add('translate-y-20','opacity-0');
},2000);

}

</script>

</body>
</html>
