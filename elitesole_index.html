<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EliteSole Co.</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
body {font-family:'Inter',sans-serif;background-color:#0a0a0a;color:white;}
.fade-in {animation:fadeIn 0.5s ease-in;}
@keyframes fadeIn {from {opacity:0;transform:translateY(10px);}to {opacity:1;transform:translateY(0);}}
.product-card:hover {transform:scale(1.02);transition:transform 0.2s ease;}
.product-image {transition:opacity 0.3s ease;}
.product-card:hover .product-image {opacity:0.9;}
.nav-link {position:relative;}
.nav-link::after {content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:white;transition:width 0.3s ease;}
.nav-link:hover::after {width:100%;}
.cart-sidebar {transform:translateX(100%);transition:transform 0.3s ease;}
.cart-sidebar.open {transform:translateX(0);}
.mobile-menu {max-height:0;overflow:hidden;transition:max-height 0.3s ease;}
.mobile-menu.open {max-height:200px;}
</style>
</head>
<body class="min-h-screen flex flex-col">

<header class="fixed top-0 w-full bg-black/95 backdrop-blur-sm z-50 border-b border-gray-800">
<div class="max-w-7xl mx-auto px-4 py-4">
<div class="flex justify-between items-center">

<div class="text-center flex-1 md:flex-none">
<h1 class="text-2xl md:text-3xl font-black tracking-tighter">EliteSole Co.</h1>
<p class="text-[10px] md:text-xs tracking-[0.3em] text-gray-400 uppercase mt-1">Your Friendly Neighborhood Sneaker Dealer</p>
</div>

<nav class="hidden md:flex gap-8 text-sm font-semibold">
<a href="#home" class="nav-link">Home</a>
<a href="#shop" class="nav-link">Shop</a>
</nav>

<div class="flex items-center gap-4">
<button onclick="toggleCart()" class="relative p-2">
<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
</svg>
<span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
</button>

<button class="md:hidden p-2" onclick="toggleMobileMenu()">
<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
</svg>
</button>
</div>

</div>

<div id="mobile-menu" class="mobile-menu md:hidden">
<div class="pt-4 pb-2 flex flex-col gap-3 text-sm font-semibold border-t border-gray-800 mt-4">
<a href="#home" class="py-2">Home</a>
<a href="#shop" class="py-2">Shop</a>
</div>
</div>

</div>
</header>

<section id="home" class="pt-32 pb-12 px-4 text-center">
<div class="max-w-4xl mx-auto fade-in">
<p class="text-xs tracking-[0.4em] text-gray-400 mb-4 uppercase">Welcome to</p>
<h2 class="text-4xl md:text-6xl font-black mb-2 tracking-tight">EliteSole Co.</h2>
<p class="text-gray-400 text-sm md:text-base">Premium sneakers. Trusted source. Local service.</p>
</div>
</section>

<footer class="border-t border-gray-800 py-8 px-4 text-center text-sm text-gray-500">
<div class="max-w-7xl mx-auto">
<p>&copy; 2026 EliteSole Co. All rights reserved.</p>
</div>
</footer>

</body>
</html>
